<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>mgflow — #monkigras</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="logo">mgflow</span>
        <span class="tag">#monkigras</span>
        <span class="version">v{{ APP_VERSION }}</span>
      </div>
      <div class="header-right">
        <button class="video-toggle" id="videoToggle" title="Show/hide stream">📺</button>
        <span class="status-dot" id="statusDot" title="Connecting…"></span>
        <span class="post-count" id="postCount">0 posts</span>
      </div>
    </div>
  </header>

  <div class="app-layout">

    <!-- ── Video panel ── -->
    <aside class="video-panel" id="videoPanel">

      <!-- Stream selector -->
      <div class="stream-selector">
        <select id="streamSelect" class="stream-select"></select>
        <button class="stream-icon-btn" id="streamAddBtn" title="Add stream">+</button>
        <button class="stream-icon-btn" id="streamRemoveBtn" title="Remove stream">✕</button>
      </div>

      <div class="stream-add-form" id="streamAddForm">
        <input id="streamNameInput" class="stream-input" type="text" placeholder="Stream name">
        <input id="streamUrlInput" class="stream-input" type="text" placeholder="YouTube URL or video ID">
        <div class="stream-form-btns">
          <button class="clip-btn" id="streamSaveBtn" style="margin:0">Add stream</button>
          <button class="stream-cancel-btn" id="streamCancelBtn">Cancel</button>
        </div>
      </div>

      <div class="video-wrapper">
        <div id="ytPlayer"></div>
      </div>

      <div class="session-block">
        <label class="panel-label" for="sessionContext">Current session</label>
        <textarea id="sessionContext" class="panel-textarea session-textarea"
                  placeholder="Talk title · Speaker…" rows="2"></textarea>
      </div>

      <div class="clip-block">
        <label class="panel-label" for="clipNote">Clip note</label>
        <textarea id="clipNote" class="panel-textarea clip-textarea"
                  placeholder="What's worth noting right now…" rows="3"></textarea>
        <button class="clip-btn" id="clipBtn">📎 Clip to Blocks</button>
      </div>

    </aside>

    <div class="resizer" id="resizer"></div>

    <!-- ── Feed ── -->
    <section class="feed-section">
      <div class="day-filter" id="dayFilter">
        <button class="day-btn active" data-day="">All</button>
        <button class="day-btn" data-day="day1">Day 1 · Mar 19</button>
        <button class="day-btn" data-day="day2">Day 2 · Mar 20</button>
      </div>
      <div id="feed"></div>
    </section>

    <!-- ── Timeline (vertical, right) ── -->
    <div class="timeline-panel" id="timelinePanel">
      <canvas id="timelineCanvas"></canvas>
      <div class="timeline-tooltip" id="timelineTooltip"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
