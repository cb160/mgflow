<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>mgflow — #monkigras</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="logo">mgflow</span>
        <span class="tag">#monkigras</span>
        <span class="version">v{{ APP_VERSION }}</span>
      </div>
      <div class="header-right">
        <span class="status-dot" id="statusDot" title="Connecting…"></span>
        <span class="post-count" id="postCount">0 posts</span>
      </div>
    </div>
  </header>

  <div class="timeline-strip" id="timelineStrip">
    <canvas id="timelineCanvas"></canvas>
    <div class="timeline-tooltip" id="timelineTooltip"></div>
  </div>

  <main class="feed-container">
    <div id="feed"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
